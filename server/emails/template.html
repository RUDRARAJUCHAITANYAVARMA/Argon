<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f6fb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 40px 20px;
            color: #1f2937;
        }

        .container {
            max-width: 760px;
            margin: auto;
            background: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        /* Header */

        .header {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            text-align: center;
            padding: 50px 35px;
        }

        .header h1 {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .tagline {
            color: #dbeafe;
            font-size: 18px;
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .date {
            color: #bfdbfe;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* News Section */

        .news {
            padding: 35px;
        }

        .card {
            padding: 24px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .card:last-child {
            border-bottom: none;
        }

        .card h2 {
            font-size: 22px;
            color: #111827;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card p {
            font-size: 16px;
            color: #4b5563;
            line-height: 1.8;
        }

        /* Footer */

        .footer {
            background: #f8fafc;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            padding: 28px;
        }

        .footer p {
            color: #6b7280;
            font-size: 14px;
        }

        .footer strong {
            color: #111827;
        }

        /* Mobile */

        @media only screen and (max-width:600px) {

            body {
                padding: 12px;
            }

            .header {
                padding: 40px 24px;
            }

            .header h1 {
                font-size: 30px;
            }

            .tagline {
                font-size: 16px;
            }

            .news {
                padding: 24px;
            }

            .card h2 {
                font-size: 20px;
            }

            .card p {
                font-size: 15px;
            }

        }
    </style>

</head>

<body>

    <div class="container">

        <!-- Header -->

        <div class="header">

            <h1>The Morning Brief</h1>

            <div class="tagline">
                10 stories that matter. Curated for your morning.
            </div>

            <div class="date">
                {{DATE}}
            </div>

        </div>

        <!-- Dynamic News Cards -->

        <div class="news">

            {{NEWS_CONTENT}}

        </div>

        <!-- Footer -->

        <div class="footer">

            <p>
                Made with ❤️ by indie developer
                <strong>Chaitanya Varma Rudraraju</strong>
            </p>

        </div>

    </div>

</body>

</html>
